<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webparts360 | Midnight Luxe</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { obsidian: '#080808', champagne: '#D4C7B0' },
                    fontFamily: { serif: ['Cormorant Garamond', 'serif'], sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>

    <style type="text/css">
        body { background-color: #080808; color: #D4C7B0; margin: 0; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        .hero-title { opacity: 0; transform: translateY(30px); }
        .reveal-section { opacity: 0; transform: translateY(20px); }
        .parallax-wrapper { overflow: hidden; height: 100%; width: 100%; }
        .parallax-img { transform: scale(1.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useLayoutEffect } = React;

        const App = () => {
            // useLayoutEffect ensures this runs AFTER the DOM is painted by React
            useLayoutEffect(() => {
                gsap.registerPlugin(ScrollTrigger);

                // 1. Hero Entrance
                const tl = gsap.timeline({ delay: 0.5 });
                tl.to(".hero-title", {
                    opacity: 1,
                    y: 0,
                    duration: 1.8,
                    ease: "power4.out",
                    stagger: 0.3
                });

                // 2. Parallax Effect
                gsap.to(".parallax-img", {
                    yPercent: -15,
                    ease: "none",
                    scrollTrigger: {
                        trigger: ".hero-section",
                        start: "top top",
                        end: "bottom top",
                        scrub: true
                    }
                });

                // 3. Section Reveals
                gsap.utils.toArray(".reveal-section").forEach((section) => {
                    gsap.to(section, {
                        opacity: 1,
                        y: 0,
                        duration: 1.2,
                        ease: "power3.out",
                        scrollTrigger: {
                            trigger: section,
                            start: "top 85%",
                            toggleActions: "play none none none"
                        }
                    });
                });
            }, []);

            return (
                <main>
                    {/* Navigation */}
                    <nav className="fixed top-0 w-full z-[100] border-b border-white/5 backdrop-blur-md bg-obsidian/40 px-10 py-6 flex justify-between items-center">
                        <span className="font-serif italic text-2xl tracking-widest">Webparts360</span>
                        <button className="text-[10px] tracking-[0.2em] uppercase border-b border-champagne pb-1">Consultation</button>
                    </nav>

                    {/* Hero Section */}
                    <section className="hero-section relative h-screen flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0 z-0 parallax-wrapper">
                            <img src="https://images.unsplash.com/photo-1495020689067-958852a7765e?q=80&w=2070&auto=format&fit=crop" 
                                 className="parallax-img w-full h-full object-cover opacity-20 grayscale" />
                            <div className="absolute inset-0 bg-gradient-to-b from-obsidian via-transparent to-obsidian" />
                        </div>
                        <div className="relative z-10 text-center px-6">
                            <h2 className="hero-title font-mono text-[9px] tracking-[0.6em] uppercase mb-8 opacity-50">Operational Infrastructure</h2>
                            <h1 className="hero-title font-serif text-6xl md:text-[90px] leading-tight mb-8 italic">
                                Mission <span className="not-italic">Critical</span> Elegance.
                            </h1>
                            <p className="hero-title max-w-xl mx-auto text-sm opacity-60 leading-relaxed font-light tracking-wide">
                                Transforming Microsoft 365 into a high-performance engine for the enterprise.
                            </p>
                        </div>
                    </section>

                    {/* Features */}
                    <section className="py-40 px-6 md:px-20 bg-obsidian border-t border-white/5">
                        <div className="grid md:grid-cols-3 gap-20">
                            {["Automate Teams", "SharePoint Mastery", "Tenant Security"].map((title, i) => (
                                <div key={i} className="reveal-section">
                                    <div className="font-serif italic text-3xl mb-6 opacity-20">0{i+1}</div>
                                    <h4 className="text-xl mb-4 font-semibold tracking-tighter">{title}</h4>
                                    <p className="text-xs opacity-40 leading-relaxed uppercase tracking-[0.2em]">
                                        Refining the core logic of your digital workspace with surgical precision.
                                    </p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Footer CTA */}
                    <section className="reveal-section h-[60vh] flex flex-col items-center justify-center border-t border-white/5">
                        <h2 className="font-serif text-4xl italic mb-10">Secure Your Instance.</h2>
                        <button className="px-12 py-5 border border-champagne text-[10px] tracking-[0.4em] uppercase hover:bg-champagne hover:text-obsidian transition-all duration-500">
                            Book a consultation
                        </button>
                    </section>
                </main>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
